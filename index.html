  background:linear-gradient(90deg,#00a0ff,transparent,#00a0ff);
  background-size:200% 100%;

}
@keyframes currentLine{

  100%{background-position:200% 0;}
}

    <button class="closeAdd" onclick="closeAddModal()">我知道了</button>

</div>

];

// 最新游戏
const newGames = [
  { name: "斗罗大陆6SSP", time: "2026-04-16", index: 0 },
  { name: "枫叶岛冒险岛H5", time: "2026-04-16", index: 1 },

  { name: "斗罗大陆6SSP", price: "188元" },
  { name: "枫叶岛冒险岛H5", price: "388元" },

  { name: "口袋大冒险", price: "188元" },
  { name: "死神虚域", price: "188元" },
];

let selectedGame = null;

// 切换金额框
function toggleMoney(){
  const box = document.getElementById('moneyBox');
  box.style.display = box.style.display === 'block' ? 'none' : 'block';
}

// 支付
function payWechat(){
  if(selectedGame === null){
    alert("请先选择左侧游戏");
    return;
  }
  const money = document.getElementById('payMoney').value.trim();
  let url = WX_PAY_URL;
  if(money) url += "?money=" + money;
  window.open(url, '_blank');
}

function payAlipay(){
  if(selectedGame === null){
    alert("请先选择左侧游戏");
    return;
  }
  const money = document.getElementById('payMoney').value.trim();
  let url = ZFB_PAY_URL;
  if(money) url += "?money=" + money;
  window.open(url, '_blank');
}

// 购买弹窗
function openBuyModal(){
  document.getElementById('buyModal').classList.add('show');
  renderBuy();
}
function closeBuyModal(){
  document.getElementById('buyModal').classList.remove('show');
}

function renderBuy(keyword=''){
  const list = document.getElementById('buyList');
  list.innerHTML = '';
  buyGames.forEach((g,i)=>{
    if(g.name.includes(keyword)){
      list.innerHTML += `
        <div class="buyItem ${selectedGame === i ? 'active' : ''}" onclick="chooseGame(${i})">
          ${g.name}
          <div class="buyPrice">${g.price}</div>
        </div>
      `;
    }
  });
}

function chooseGame(idx){
  selectedGame = idx;
  const game = buyGames[idx];
  alert("已选择："+game.name+" - "+game.price);
  
  // 自动填入价格
  const num = game.price.replace(/\D/g,'');
  document.getElementById('payMoney').value = num;
  
  renderBuy(document.getElementById('buySearch').value.trim());
}

function searchBuyGame(){
  const key = document.getElementById('buySearch').value.trim();
  renderBuy(key);
}

// 最新游戏
function openNewGameModal(){
  document.getElementById('newGameModal').classList.add('show');
  renderNew();
}
function closeNewGameModal(){
  document.getElementById('newGameModal').classList.remove('show');
}
function renderNew(){
  const box = document.getElementById('newGameList');
  box.innerHTML = '';
  newGames.forEach(g=>{
    box.innerHTML += `
      <div class="newGameItem" onclick="goToGame(${g.index})">
        ${g.name}
        <div class="time">${g.time}</div>
      </div>
    `;
  });
}

}
function closeGameMenu(){
  document.getElementById('gameMenuModal').classList.remove('show');
}
function renderMenu(key=''){
  const list = document.getElementById('gameMenuList');
  list.innerHTML = '';
  games.forEach((g,i)=>{
    if(g.name.includes(key)){
      list.innerHTML += `<div class="menu-item" onclick="goToGame(${i})">${g.name}</div>`;
    }
  });
}
function searchGame(){
  const key = document.getElementById('gameSearch').value.trim();
  renderMenu(key);
}
function goToGame(i){
  closeGameMenu();
  document.querySelectorAll('.game-card')[i].scrollIntoView({behavior:'smooth'});
}

// 桌面
function showAddTip(){
  document.getElementById('addModal').classList.add('show');
}
function closeAddModal(){
  document.getElementById('addModal').classList.remove('show');
}

// 返回顶部
function goToTop(){
  window.scrollTo({top:0,behavior:'smooth'});
}
window.onscroll = function(){
  const btn = document.getElementById('backTop');
  btn.classList.toggle('show', window.scrollY>200);
}

// 复制
function copyWechat(){
  navigator.clipboard.writeText(wechatId).then(()=>alert("微信复制成功！")).catch(()=>alert("复制失败"));
}
function copyLink(t){
  navigator.clipboard.writeText(t).then(()=>alert("链接复制成功！")).catch(()=>alert("复制失败"));
}

// 图片
function openImg(s){
  document.getElementById('bigImg').src = s;
  document.getElementById('imgModal').classList.add('show');
}
function closeImg(){
  document.getElementById('imgModal').classList.remove('show');
}
