html {
  scroll-behavior: smooth;
  touch-action: manipulation;
}
body{
  min-height:100vh;
  background:#fff;
  padding:15px;
  color:#111;
  overflow-x: hidden;
}
.page-title{
  text-align:center;
  font-size:28px;
  margin:30px 0 20px;
  font-weight:bold;
  background:linear-gradient(90deg,#0066ff,#00a0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.btn-group {
  max-width: 340px;
  margin: 0 auto 25px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn-item {
  width: 100%;
  padding: 14px 20px;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s ease;
}
.btn-item:active {
  transform: scale(0.96);
}

.btn-game {
  background: linear-gradient(90deg,#0066ff,#00a0ff);
}
.btn-new {
  background: linear-gradient(90deg,#ff3c6e,#ff6b35);
}
.btn-service {
  background: linear-gradient(90deg,#1a6dff,#004eff);
}
.btn-buy {
  background: linear-gradient(90deg,#11c274,#08a060);
}

.addHome-btn{
  padding: 8px 12px;
  background:linear-gradient(90deg,#ff9500,#ff5e00);
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:13px;
  font-weight:bold;
  cursor:pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  margin-bottom:10px;
}

.backTop{
  position: fixed;
  bottom: 25px;
  right: 15px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(90deg,#0066ff,#00a0ff);
  color: #fff;
  font-size: 22px;
  border: none;
  box-shadow: 0 4px 10px rgba(0,100,255,0.15);
  cursor: pointer;
  z-index: 999;
  display: none;
  align-items: center;
  justify-content: center;
}
.backTop.show{
  display: flex;
}

.container{
  max-width:500px;
  margin:0 auto;
}
.game-card{
  background:#fff;
  border-radius:16px;
  padding:22px;
  margin-bottom:20px;
  border:2px solid rgba(0,140,255,0.12);
  box-shadow:0 3px 15px rgba(0,100,255,0.06);
  transition:0.2s;
}
.game-card:active{
  transform:scale(0.98);
}
.game-price{
  background:#fff1f0;
  color:#c72828;
  padding:10px 15px;
  border-radius:8px;
  margin-bottom:16px;
  font-size:15px;
  font-weight:bold;
  text-align:center;
}
.game-info{
  background:#f7f9ff;
  padding:12px 15px;
  border-radius:8px;
  margin-top:16px;
  font-size:14px;
  color:#333;
  line-height:1.5;
  border-left:3px solid #1a6dff;
}
.game-name{
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-bottom:12px;
  color:#111;
}
.btn-row{
  display:flex;
  gap:10px;
  margin-bottom:12px;
  align-items:center;
}
.btn-download{
  flex:1;
  padding:14px;
  border-radius:10px;
  border:none;
  font-size:15px;
  font-weight:bold;
  color:#fff;
  cursor:pointer;
  transition:0.15s;
}
.btn-download:active{
  transform:scale(0.96);
}

.btn-download.android{
  background:linear-gradient(90deg,#0066ff,#00a0ff);
}
.btn-download.ios{
  background:linear-gradient(90deg,#5a39ff,#7c4dff);
}
.btn-download.admin{
  background:linear-gradient(90deg,#2b58ff,#417dff);
}
.btn-download.img{
  background:linear-gradient(90deg,#00c896,#00a878);
}
.btn-download.supersign{
  background:linear-gradient(90deg, #ff4d94, #ff3366);
}
.btn-download.buy{
  background:linear-gradient(90deg, #ff6b35, #ff451a);
}
.btn-download.active{
  background:linear-gradient(90deg, #ffcc00, #ff9900);
}
.btn-download.register{
  background:linear-gradient(90deg, #00c896, #00a878);
}
.btn-download.pc{
  background:linear-gradient(90deg, #6a11cb, #2575fc);
}
.btn-download.web{
  background:linear-gradient(90deg, #17a2b8, #20c997);
}
.btn-download.package {
  background:linear-gradient(90deg, #ff6b9d, #c44569);
}

.btn-copy{
  width:68px;
  padding:14px 0;
  border-radius:10px;
  border:1px solid #e0e0e0;
  background:#f7f9ff;
  color:#1a6dff;
  font-size:14px;
  cursor:pointer;
}

/* 弹窗 */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:15px;
}
.modal.show{
  display:flex;
}
.modal-box{
  background:#fff;
  max-width:400px;
  width:100%;
  border-radius:16px;
  padding:25px;
  max-height:80vh;
  overflow-y:auto;
}
.modal-title{
  font-size:20px;
  font-weight:bold;
  text-align:center;
  margin-bottom:18px;
  color:#222;
}
.search-input{
  width:100%;
  padding:10px 14px;
  border:1px solid #cce5ff;
  border-radius:10px;
  font-size:15px;
  margin-bottom:15px;
  outline:none;
}
.search-input:focus{
  border-color:#0066ff;
}
.modal-item{
  padding:12px;
  background:#f0f7ff;
  color:#0066ff;
  border-radius:10px;
  margin-bottom:8px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
}
.modal-item:hover{
  background:#0066ff;
  color:#fff;
}

.new-item{
  padding:12px;
  background:#fff5f7;
  color:#ff3c6e;
  border-radius:10px;
  margin-bottom:8px;
  font-weight:bold;
  cursor:pointer;
  text-align:center;
}
.new-item:hover{
  background:#ff3c6e;
  color:#fff;
}
.time{
  font-size:12px;
  color:#999;
  margin-top:4px;
}

.buy-box{

  width:100%;
  border-radius:16px;
  padding:25px;
  max-height:80vh;
  overflow-y:auto;
  display:flex;
  gap:20px;

.buy-left,.buy-right{

.buy-item{

  font-weight:bold;

  color:#fff;
}
.buy-price{

  color:#999;
  margin-top:4px;
}

.custom-btn{

  padding:14px;

  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:12px;

.money-box{

.img-modal img{

body{
  user-select:none;
  -webkit-user-select:none;

input{

</div>

<!-- 添加桌面 -->
<div class="modal" id="addModal" onclick="closeAdd()">

    <button class="close-add" onclick="closeAdd()">我知道了</button>
  </div>
</div>

<!-- 图片预览 -->
<div class="img-modal" id="imgModal" onclick="closeImg()">

function openMenu(){

  document.getElementById('menuModal').classList.remove('show');
}
function renderMenu(k=''){
  let l = document.getElementById('menuList');
  l.innerHTML='';
  games.forEach((g,i)=>{
    if(g.name.includes(k)){
      l.innerHTML+=`<div class="modal-item" onclick="go(${i})">${g.name}</div>`;
    }
  });
}

  renderMenu(document.getElementById('searchInput').value);
}
function go(i){
  closeMenu();
  closeNew();
  setTimeout(() => {
    const target = document.getElementById("gameCard" + i);
    if(target){
      let top = target.offsetTop - 30;
      window.scrollTo({top: top, behavior: "smooth"});
    }
  }, 150);
}

function openNew(){
  document.getElementById('newModal').classList.add('show');
  renderNew();
}
function closeNew(){
  document.getElementById('newModal').classList.remove('show');
}
function renderNew(){
  let b = document.getElementById('newList');
  b.innerHTML='';
  newGames.forEach(g=>{
    // 根据你填的num，自动获取真实跳转下标
    let realIndex = getGameIdxByNum(g.num);
    b.innerHTML+=`
    <div class="new-item" onclick="go(${realIndex})">
      ${g.name}<div class="time">${g.time}</div>
    </div>`;
  });
}
// 根据你写的数字，自动匹配游戏下标
function getGameIdxByNum(num){
  let item = games.find(g => g.num === num);
  if(!item) return 0;
  return games.indexOf(item);
}
